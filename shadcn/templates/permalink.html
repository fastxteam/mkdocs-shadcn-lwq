<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll("a.{{ config.mdx_configs['toc']['permalink_class'] | default('headerlink') }}").forEach(function (link) {
            link.addEventListener("click", function (e) {
                e.preventDefault();

                // Build the full URL with the anchor fragment
                const url = window.location.origin + window.location.pathname + this.getAttribute("href");

                navigator.clipboard.writeText(url).then(function () {

                    /*
                    const original = link.textContent;

                    setTimeout(() => (link.textContent = original), 1500);
                    */
                });
            });
        });
    });
</script>
